name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-health:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (macOS)
        if: runner.os == 'macOS'
        env: { CI: "1" }
        run: bash platform/macos/install.sh --ci

      - name: Install (Linux)
        if: runner.os == 'Linux'
        env: { CI: "1", DEBIAN_FRONTEND: noninteractive }
        run: bash platform/linux/install.sh --ci

      - name: Install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env: { CI: "1" }
        run: pwsh -File platform/windows/install.ps1 -Ci

      - name: Probe /health (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          VENV_PY="$HOME/Library/Application Support/DocToMarkdown/.venv/bin/python"
          SRC="$HOME/Library/Application Support/DocToMarkdown/src/app.py"
          "$VENV_PY" "$SRC" &
          SERVER_PID=$!
          for _ in $(seq 1 30); do
            sleep 1
            if curl -fs http://127.0.0.1:5555/health >/dev/null 2>&1; then
              curl -s http://127.0.0.1:5555/health; echo
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
          done
          echo "server never came up" >&2
          kill $SERVER_PID 2>/dev/null || true
          exit 1

      - name: Probe /health (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          VENV_PY="$HOME/.local/share/DocToMarkdown/.venv/bin/python"
          SRC="$HOME/.local/share/DocToMarkdown/src/app.py"
          "$VENV_PY" "$SRC" &
          SERVER_PID=$!
          for _ in $(seq 1 30); do
            sleep 1
            if curl -fs http://127.0.0.1:5555/health >/dev/null 2>&1; then
              curl -s http://127.0.0.1:5555/health; echo
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
          done
          echo "server never came up" >&2
          kill $SERVER_PID 2>/dev/null || true
          exit 1

      - name: Probe /health (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Venv = Join-Path $env:LOCALAPPDATA "DocToMarkdown\.venv\Scripts\python.exe"
          $Src  = Join-Path $env:LOCALAPPDATA "DocToMarkdown\src\app.py"
          $proc = Start-Process -FilePath $Venv -ArgumentList $Src -PassThru -WindowStyle Hidden
          try {
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:5555/health -TimeoutSec 2
                if ($r.StatusCode -eq 200) { Write-Host $r.Content; exit 0 }
              } catch { }
            }
            Write-Error "server never came up"
            exit 1
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

  docker:
    name: Docker build & probe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: doctomarkdown:ci
      - name: Run and probe /health
        run: |
          set -e
          docker run --rm -d -p 5555:5555 --name doctomarkdown doctomarkdown:ci
          # markitdown[all] pulls onnxruntime + azure SDKs — imports take ~30-60s cold
          for _ in $(seq 1 90); do
            sleep 2
            if curl -fs http://127.0.0.1:5555/health >/dev/null 2>&1; then
              curl -s http://127.0.0.1:5555/health; echo
              docker stop doctomarkdown >/dev/null
              exit 0
            fi
          done
          docker logs doctomarkdown || true
          exit 1

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: |
          # Fail only on warning-or-worse; info-level advice (e.g. SC2015 style)
          # doesn't break the build.
          shellcheck --severity=warning -s bash \
            install.sh uninstall.sh \
            platform/linux/install.sh \
            platform/macos/install.sh \
            'platform/macos/DocToMarkdown.app/Contents/MacOS/DocToMarkdown'

  unit-tests:
    name: Unit tests (video pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # Only lightweight deps needed for the smoke test — no whisper/torch
          pip install pytest yt-dlp Pillow scenedetect anthropic openai google-generativeai
      - name: Run pytest
        env:
          # Ensure vision module autodetect returns None
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          # Stub whisper import so we don't need torch on the CI test job
          mkdir -p _stubs
          echo "def load_model(*a, **k): raise RuntimeError('stub')" > _stubs/whisper.py
          PYTHONPATH="_stubs:$PWD" pytest tests/ -v
